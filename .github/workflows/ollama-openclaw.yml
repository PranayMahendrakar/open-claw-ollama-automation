name: OpenClaw Ollama Automation

on:
  push:
      branches: [ main ]
        pull_request:
            branches: [ main ]
              workflow_dispatch:
                  inputs:
                        runner_type:
                                description: 'Runner type: cpu or gpu'
                                        required: true
                                                default: 'cpu'
                                                        type: choice
                                                                options:
                                                                          - cpu
                                                                                    - gpu

                                                                                    jobs:

                                                                                      # ─── CPU Job ─────────────────────────────────────────────
                                                                                        openclaw-cpu:
                                                                                            name: OpenClaw + Ollama (CPU)
                                                                                                if: github.event.inputs.runner_type == 'cpu' || github.event_name != 'workflow_dispatch'
                                                                                                    runs-on: ubuntu-latest
                                                                                                        timeout-minutes: 20
                                                                                                        
                                                                                                            steps:
                                                                                                                  - name: Checkout repository
                                                                                                                          uses: actions/checkout@v4
                                                                                                                          
                                                                                                                                - name: Set up Python 3.11
                                                                                                                                        uses: actions/setup-python@v5
                                                                                                                                                with:
                                                                                                                                                          python-version: '3.11'
                                                                                                                                                          
                                                                                                                                                                - name: Cache pip dependencies
                                                                                                                                                                        uses: actions/cache@v4
                                                                                                                                                                                with:
                                                                                                                                                                                          path: ~/.cache/pip
                                                                                                                                                                                                    key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
                                                                                                                                                                                                              restore-keys: ${{ runner.os }}-pip-
                                                                                                                                                                                                              
                                                                                                                                                                                                                    - name: Install Ollama
                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                      curl -fsSL https://ollama.com/install.sh | sh
                                                                                                                                                                                                                                                ollama --version
                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                      - name: Start Ollama service (CPU)
                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                        ollama serve &
                                                                                                                                                                                                                                                                                  sleep 6
                                                                                                                                                                                                                                                                                            echo "Ollama CPU service started"
                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                  - name: Pull OpenClaw model (CPU — deepseek-r1:1.5b)
                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                    ollama pull deepseek-r1:1.5b
                                                                                                                                                                                                                                                                                                                              ollama list
                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                    - name: Install Python dependencies
                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                      pip install --upgrade pip
                                                                                                                                                                                                                                                                                                                                                                pip install -r requirements.txt
                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                      - name: Load Pranay knowledge base
                                                                                                                                                                                                                                                                                                                                                                              run: python scripts/load_knowledge.py --device cpu --test
                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                    - name: Run OpenClaw automation (CPU)
                                                                                                                                                                                                                                                                                                                                                                                            run: python scripts/run_openclaw.py --device cpu
                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                  - name: Run WhatsApp automation (CPU — 5 min timeout)
                                                                                                                                                                                                                                                                                                                                                                                                          run: python scripts/whatsapp_bot.py
                                                                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                                                                            WHATSAPP_SESSION: ${{ secrets.WHATSAPP_SESSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                      OLLAMA_HOST: http://localhost:11434
                                                                                                                                                                                                                                                                                                                                                                                                                                                OLLAMA_MODEL: deepseek-r1:1.5b
                                                                                                                                                                                                                                                                                                                                                                                                                                                          BOT_TIMEOUT: '300'
                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                            # ─── GPU Job ─────────────────────────────────────────────
                                                                                                                                                                                                                                                                                                                                                                                                                                                              # Requires a self-hosted runner with NVIDIA GPU.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                # Label your runner: self-hosted, gpu
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # Run: OLLAMA_NUM_GPU=1 ollama serve
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    openclaw-gpu:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        name: OpenClaw + Ollama (GPU)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            if: github.event.inputs.runner_type == 'gpu'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                runs-on: self-hosted
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    timeout-minutes: 30
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Checkout repository
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      uses: actions/checkout@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Set up Python 3.11
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    uses: actions/setup-python@v5
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      python-version: '3.11'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Verify NVIDIA GPU
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              nvidia-smi
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        echo "GPU detected, proceeding with GPU mode"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Install Ollama with GPU support
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                curl -fsSL https://ollama.com/install.sh | sh
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          ollama --version
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Start Ollama service (GPU — 1 GPU layer)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  OLLAMA_NUM_GPU=1 ollama serve &
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            sleep 6
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      echo "Ollama GPU service started"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        CUDA_VISIBLE_DEVICES: '0'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # GPU can handle the bigger 7b model for more natural responses
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Pull OpenClaw model (GPU — deepseek-r1:7b)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      ollama pull deepseek-r1:7b
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ollama list
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      - name: Install Python dependencies
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        pip install --upgrade pip
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  pip install -r requirements.txt
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Load Pranay knowledge base (GPU)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                run: python scripts/load_knowledge.py --device gpu --test
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  OLLAMA_MODEL: deepseek-r1:7b
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            CUDA_VISIBLE_DEVICES: '0'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Run OpenClaw automation (GPU)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: python scripts/run_openclaw.py --device gpu
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            OLLAMA_MODEL: deepseek-r1:7b
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      CUDA_VISIBLE_DEVICES: '0'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            - name: Run WhatsApp automation (GPU — 10 min timeout)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    run: python scripts/whatsapp_bot.py
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      WHATSAPP_SESSION: ${{ secrets.WHATSAPP_SESSION }}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                OLLAMA_HOST: http://localhost:11434
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          OLLAMA_MODEL: deepseek-r1:7b
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    CUDA_VISIBLE_DEVICES: '0'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              BOT_TIMEOUT: '600'
