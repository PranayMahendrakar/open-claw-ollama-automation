name: OpenClaw Ollama Automation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      runner_type:
        description: 'Runner type: cpu or gpu'
        required: true
        default: 'cpu'
        type: choice
        options:
          - cpu
          - gpu

jobs:

  openclaw-cpu:
    name: OpenClaw + Ollama (CPU)
    if: github.event.inputs.runner_type == 'cpu' || github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama
        run: |
          ollama serve &
          sleep 6

      - name: Pull model
        run: ollama pull deepseek-r1:1.5b

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Load knowledge base
        run: python scripts/load_knowledge.py --device cpu --test

      - name: Run openclaw
        run: python scripts/run_openclaw.py --device cpu

      - name: Run WhatsApp bot
        run: python scripts/whatsapp_bot.py
        env:
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: deepseek-r1:1.5b
          BOT_TIMEOUT: '300'

  openclaw-gpu:
    name: OpenClaw + Ollama (GPU)
    if: github.event.inputs.runner_type == 'gpu'
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Verify GPU
        run: nvidia-smi

      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh

      - name: Start Ollama GPU
        run: |
          OLLAMA_NUM_GPU=1 ollama serve &
          sleep 6
        env:
          CUDA_VISIBLE_DEVICES: '0'

      - name: Pull model 7b
        run: ollama pull deepseek-r1:7b

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Load knowledge base GPU
        run: python scripts/load_knowledge.py --device gpu --test
        env:
          OLLAMA_MODEL: deepseek-r1:7b

      - name: Run openclaw GPU
        run: python scripts/run_openclaw.py --device gpu
        env:
          OLLAMA_MODEL: deepseek-r1:7b

      - name: Run WhatsApp bot GPU
        run: python scripts/whatsapp_bot.py
        env:
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: deepseek-r1:7b
          BOT_TIMEOUT: '600'
